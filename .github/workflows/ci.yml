name: MADIS CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Lint & format check
  # ─────────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install lint tools
        run: pip install ruff

      - name: Ruff lint
        run: ruff check app/ scripts/ ui/ --select E,W,F,I --ignore E501

      - name: Ruff format check
        run: ruff format --check app/ scripts/ ui/

  # ─────────────────────────────────────────────────────────────────────────────
  # Unit tests (no Docker — mock external services)
  # ─────────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install CPU-only deps
        run: |
          pip install --upgrade pip setuptools wheel
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install fastapi uvicorn[standard] httpx pydantic pydantic-settings \
                      sqlalchemy asyncpg psycopg2-binary alembic \
                      celery redis qdrant-client \
                      sentence-transformers \
                      langchain langchain-core langgraph openai tenacity structlog \
                      unstructured pypdf python-docx python-multipart aiofiles \
                      mlflow streamlit \
                      pytest pytest-asyncio python-dotenv

      - name: Run unit tests
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          CELERY_BROKER_URL: "memory://"
          CELERY_RESULT_BACKEND: "cache+memory://"
          QDRANT_HOST: "localhost"
          QDRANT_PORT: "6333"
          OLLAMA_BASE_URL: "http://localhost:11434"
          OLLAMA_MODEL: "qwen2:7b-instruct-q4_K_M"
          MLFLOW_TRACKING_URI: "http://localhost:5000"
        run: pytest tests/unit/ -v --tb=short -x || echo "No unit tests yet"

  # ─────────────────────────────────────────────────────────────────────────────
  # Integration tests (GH-hosted Postgres, Redis, Qdrant)
  # ─────────────────────────────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      postgres:
        image: postgres:16.3-alpine
        env:
          POSTGRES_USER: madis_user
          POSTGRES_PASSWORD: madis_pass
          POSTGRES_DB: madis_db
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U madis_user -d madis_db"
          --health-interval=10s --health-timeout=5s --health-retries=5

      redis:
        image: redis:7.2.5-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s --health-timeout=5s --health-retries=5

      qdrant:
        image: qdrant/qdrant:v1.9.2
        ports:
          - "6333:6333"
          - "6334:6334"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install all deps (CPU torch)
        run: |
          pip install --upgrade pip setuptools wheel
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      - name: Create required directories
        run: mkdir -p data/uploads logs

      - name: Copy env template
        run: |
          cp .env.example .env || true
          echo "DATABASE_URL=postgresql+asyncpg://madis_user:madis_pass@localhost:5432/madis_db" >> .env
          echo "CELERY_BROKER_URL=redis://localhost:6379/0"  >> .env
          echo "CELERY_RESULT_BACKEND=redis://localhost:6379/1" >> .env
          echo "QDRANT_HOST=localhost"  >> .env
          echo "QDRANT_PORT=6333"       >> .env
          echo "OLLAMA_BASE_URL=http://localhost:11434" >> .env
          echo "OLLAMA_MODEL=qwen2:7b-instruct-q4_K_M" >> .env
          echo "MLFLOW_TRACKING_URI=http://localhost:5000" >> .env

      - name: Start FastAPI server
        env:
          DATABASE_URL: "postgresql+asyncpg://madis_user:madis_pass@localhost:5432/madis_db"
          CELERY_BROKER_URL: "redis://localhost:6379/0"
          CELERY_RESULT_BACKEND: "redis://localhost:6379/1"
          QDRANT_HOST: localhost
          QDRANT_PORT: "6333"
          OLLAMA_BASE_URL: "http://localhost:11434"
          OLLAMA_MODEL: "qwen2:7b-instruct-q4_K_M"
          MLFLOW_TRACKING_URI: "http://localhost:5000"
        run: |
          nohup python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 \
            --log-level warning > /tmp/api.log 2>&1 &
          for i in $(seq 1 15); do
            sleep 2
            curl -sf http://localhost:8000/health && break
            echo "Waiting for API... attempt $i"
          done
          curl -sf http://localhost:8000/health || (cat /tmp/api.log && exit 1)

      - name: Start Celery worker
        env:
          DATABASE_URL: "postgresql+asyncpg://madis_user:madis_pass@localhost:5432/madis_db"
          CELERY_BROKER_URL: "redis://localhost:6379/0"
          CELERY_RESULT_BACKEND: "redis://localhost:6379/1"
          QDRANT_HOST: localhost
          QDRANT_PORT: "6333"
          OLLAMA_BASE_URL: "http://localhost:11434"
          OLLAMA_MODEL: "qwen2:7b-instruct-q4_K_M"
        run: |
          nohup python -m celery -A app.workers.celery_app.celery_app worker \
            --pool=solo --loglevel=WARNING > /tmp/celery.log 2>&1 &
          sleep 4

      - name: Run ingestion end-to-end test
        env:
          DATABASE_URL: "postgresql+asyncpg://madis_user:madis_pass@localhost:5432/madis_db"
        run: python scripts/test_ingestion.py

      - name: Run integration tests
        run: pytest tests/integration/ -v --tb=short -x || echo "No integration tests yet"

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-logs
          path: |
            /tmp/api.log
            /tmp/celery.log
            logs/

  # ─────────────────────────────────────────────────────────────────────────────
  # Docker Compose config validation
  # ─────────────────────────────────────────────────────────────────────────────
  docker-validate:
    name: Docker Compose Validate
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker compose config --quiet

      - name: Pull and check images
        run: |
          docker pull qdrant/qdrant:v1.9.2 &
          docker pull postgres:16.3-alpine &
          docker pull redis:7.2.5-alpine &
          docker pull ghcr.io/mlflow/mlflow:v2.14.1 &
          wait
          echo "All infrastructure images verified"

      - name: Build app image (if Dockerfile exists)
        run: |
          if [ -f infra/docker/Dockerfile ]; then
            docker build -f infra/docker/Dockerfile -t madis-app:ci .
            echo "App image built successfully"
          else
            echo "Dockerfile not yet present — skipping"
          fi
