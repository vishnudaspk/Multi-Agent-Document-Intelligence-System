# alembic.ini — generated for MADIS project
# Usage: alembic upgrade head

[alembic]
script_location = app/db/migrations
prepend_sys_path = .
version_path_separator = os

sqlalchemy.url = postgresql+psycopg2://madis_user:madis_pass@localhost:5432/madis_db
# [CONFIGURE THIS] or set DATABASE_URL env var and use env.py to read it

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
